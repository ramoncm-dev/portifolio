<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - Ramon Dev</title>
    <link rel="stylesheet" href="calculadora.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora</h1>
        <div class="calc">
            <input type="text" id="display" disabled>
            <div class="buttons">
                <button>%</button>
                <button>CE</button>
                <button>C</button>
                <button class="del">⌫</button>
                
                <button>1/x</button>
                <button>x²</button>
                <button>√</button>
                <button class="operator">÷</button>
                
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operator">×</button>
                
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operator">-</button>
                
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operator">+</button>
                
                <button>+/-</button>
                <button>0</button>
                <button>,</button>
                <button class="equals">=</button>
            </div>
        </div>
        <a href="index.html" class="back">← Voltar pro Portfólio</a>
    </div>
    <script src="calculadora.js"></script>
</body>
</html>
